<!DOCTYPE html>
<html>
<head>
<title>Booking Success</title>

<style>

body{
background: radial-gradient(circle at top,#330000,#000000 60%);
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{

backdrop-filter:blur(10px);

background:rgba(0,0,0,0.75);

border:1px solid rgba(255,0,0,0.3);

box-shadow:0 0 25px red;

padding:35px;

border-radius:15px;

width:380px;

text-align:center;

position:relative;
}

h1{
color:#ff2b2b;
text-shadow:0 0 10px red;
margin-bottom:20px;
}

p{
margin:8px 0;
font-size:17px;
}

span{
color:#ff9999;
font-weight:bold;
}

.divider{
margin:15px 0;
border-top:1px dashed rgba(255,255,255,0.3);
}

/* Booking ID Badge */
.booking-id{
position:absolute;
top:-12px;
right:-12px;
background:#ff0000;
padding:6px 12px;
border-radius:10px;
font-size:12px;
box-shadow:0 0 10px red;
}

/* QR Placeholder */
.qr-box{
margin-top:15px;
padding:10px;
border:1px dashed rgba(255,255,255,0.3);
}

button{

margin-top:20px;

padding:10px 20px;

border:none;

border-radius:8px;

background:linear-gradient(45deg,#ff0000,#b30000);

color:white;

cursor:pointer;

}

button:hover{
box-shadow:0 0 12px red;
}

</style>

</head>

<body>

<div class="card">

<div class="booking-id">
ID: {{ booking.id }}
</div>

<h1>🎉 Booking Successful</h1>

<div class="divider"></div>

<p>🎬 Movie: <span>{{show.movie.name}}</span></p>

<p>🏢 Theatre: <span>{{show.theatre.name}}</span></p>

<p>📍 Location: <span>{{show.theatre.location}}</span></p>

<p>🎟 Seats: <span>{{seats}}</span></p>

<p>💰 Total: <span>₹{{total_price}}</span></p>

<p>⏰ Show Time: <span>{{show.show_time}}</span></p>

<p>📅 Booked At: <span>{{ booking.booking_time }}</span></p>

<div class="divider"></div>

<!-- QR Code will come here -->
<div class="qr-box">
  <p>📱 Scan QR</p>
  <img src="data:image/png;base64,{{ qr_code }}" width="150">
</div>
<a href="{% url 'download_ticket' booking.id %}">
  <button>Download Ticket PDF</button>
</a>

<a href="{% url 'dashboard' %}">
<button>Back to Dashboard</button>
</a>

</div>

</body>
</html>
