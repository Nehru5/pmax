<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .seatArea{
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
      font-weight: bolder;
    }
    .seatArea div{
      display: flex;
      align-items: center;
      justify-content: space-evenly;
      background-color: yellow;
      padding: 10px;
      border: 1px solid black;
      cursor: pointer;
      border-radius: 5px;
    }
    /*Selected seats*/
    .seatArea div.selected{
      background-color: green;
      color: white;
    }

    /*Already Booked seats*/
    .seatArea div.booked{
      background-color: red;
      color: white;
      cursor: not-allowed;
    }

  </style>
</head>
<body>
  <h2>{{show.movie.name}} - {{show.theatre.name}}</h2>
  <h2>Show Time: {{show.show_time}}</h2>
  <h2>Available seats: {{show.available_seats}}</h2>
  <h2>Price: {{show.price}}</h2>

  <form action="" method="post">
    {% csrf_token %}

    <div class="seatArea">
      {% for seat in seats %}
        <div id="{{seat}}" class="{{seat}} {% if seat in booked_seats %}booked{% endif %}" onclick="selectSeat('{{seat}}')">
          {{seat}}
        </div>
      {% endfor %}
    </div>
    <input type="hidden" name="selected_seats" id="selectedSeats"><br>
    <button>Confirm Booking</button>
    
  </form>

  <script>
    let selected=[]
    function selectSeat(id){
      let seat = document.getElementById(id)
      if(seat.classList.contains("booked")) return

      seat.classList.toggle("selected")
      if(seat.classList.contains("selected")){
        selected.push(id)
      }else{
        selected = selected.filter(s=>s!=id)
      }
      document.getElementById("selectedSeats").value=selected.join(",")
    }
  </script>
  
</body>
</html>
