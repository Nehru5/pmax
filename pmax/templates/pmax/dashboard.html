<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movies Dashboard</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body{
  background: linear-gradient(135deg,#000000,#021f02,#003300);
  min-height:100vh;
  color:white;
}

/* Heading */
h1{
  color:#00ff88;
  margin:20px;
}

/* Container */
.container{
  display:flex;
  align-items:center;
  justify-content:center;
  flex-wrap:wrap;
  gap:30px;
  padding:20px;
}

/* Glass Cards */
.cards{
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.6);
  border:1px solid rgba(0,255,0,0.2);
  box-shadow:0 0 20px rgba(0,255,0,0.25);
  padding:20px;
  border-radius:15px;
  width:220px;
  text-align:center;
  transition:0.3s;
}

/* Card hover animation */
.cards:hover{
  transform: translateY(-8px);
  box-shadow:0 0 25px #00ff88;
}

/* Movie Image */
.cards img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:10px;
}

/* Text */
.cards h2{
  font-size:18px;
  margin:5px 0;
}

/* Button */
button{
  background:#00ff88;
  color:black;
  font-weight:bold;
  border:none;
  border-radius:8px;
  padding:8px 15px;
  margin-top:10px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#00cc66;
  box-shadow:0 0 10px #00ff88;
}

</style>

</head>

<body>

<center><h1>Movies List</h1></center>
<a href="{% url 'logout' %}"><button>Logout</button></a>
<div class="container">

{% for i in movies %}
<div class="cards">

<img src="{{i.image.url}}" alt="">

<h2>Title: {{i.name}}</h2>
<h2>Duration: {{i.duration}} mins</h2>

<a href="{% url 'movie_detail' i.id %}"><button>View</button></a>

</div>
{% endfor %}

</div>

</body>
</html>
