<!DOCTYPE html>
<html>
<head>
<title>Payment</title>

<style>
body{
  background: radial-gradient(circle at top,#330000,#000000 60%);
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CARD */
.card{
  background:rgba(0,0,0,0.8);
  padding:30px;
  border-radius:15px;
  width:350px;
  text-align:center;
  box-shadow:0 0 20px red;
}

h1{
  color:#ff2b2b;
  margin-bottom:20px;
}

p{
  margin:10px 0;
}

/* BUTTON */
button{
  margin-top:20px;
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#ff0000,#b30000);
  color:white;
  cursor:pointer;
  font-weight:bold;
}

/* LOADER */
#loader{
  display:none;
  margin-top:20px;
}

.spinner{
  width:50px;
  height:50px;
  border:5px solid rgba(255,255,255,0.2);
  border-top:5px solid red;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:0 auto;
}

@keyframes spin{
  0%{ transform:rotate(0deg); }
  100%{ transform:rotate(360deg); }
}

/* SUCCESS */
#successBox{
  display:none;
  margin-top:20px;
}

.checkmark{
  width:70px;
  height:70px;
  border-radius:50%;
  border:4px solid #00ff99;
  position:relative;
  margin:20px auto;
  animation:pop 0.5s ease;
}

.checkmark::after{
  content:'';
  position:absolute;
  left:18px;
  top:30px;
  width:20px;
  height:10px;
  border-left:4px solid #00ff99;
  border-bottom:4px solid #00ff99;
  transform:rotate(-45deg);
}

@keyframes pop{
  0%{ transform:scale(0); }
  100%{ transform:scale(1); }
}

#successBox p{
  color:#00ff99;
  font-weight:bold;
  font-size:16px;
}

</style>

</head>

<body>

<div class="card">

<h1>💳 Payment</h1>

<p>Movie: {{show.movie.name}}</p>
<p>Seats: {{seats}}</p>
<p>Total: ₹{{total_price}}</p>

<hr>

<p>Confirm your payment</p>

<!-- FORM -->
<form id="paymentForm" method="POST" action="{% url 'confirm_payment' %}">
  {% csrf_token %}
  <button id="payBtn" type="button" onclick="startPayment()">Pay Now</button>
</form>

<!-- 🔄 LOADER -->
<div id="loader">
  <div class="spinner"></div>
  <p>Processing Payment...</p>
</div>

<!-- ✅ SUCCESS -->
<div id="successBox">
  <div class="checkmark"></div>
  <p>Payment Successful</p>
</div>

</div>

<script>
function startPayment(){
    // Hide button safely
    document.getElementById("payBtn").style.display = "none";

    // Show loader
    document.getElementById("loader").style.display = "block";

    // Step 1: Loader
    setTimeout(() => {
        document.getElementById("loader").style.display = "none";
        document.getElementById("successBox").style.display = "block";

        // Step 2: Success → submit
        setTimeout(() => {
            document.getElementById("paymentForm").submit();
        }, 1500);

    }, 2000);
}
</script>

</body>
</html>
