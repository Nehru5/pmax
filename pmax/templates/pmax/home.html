<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{
      padding: 0;margin: 0;
    }
    .nav{
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 75px;
      width: 100%;
      background-color: black;
      color: white;
      margin-bottom: 30px;
    }
    .right{
      display: flex;
      align-items: center;
      justify-content: space-evenly;
      width: 30%;
    }

    .hero-section{
      height: 300px;
      background-color: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-evenly;
      flex-direction: column;
    }

    .hero-section button{
      background-color: green;
      color: white;
      font-weight: bolder;
      border: none;
      border-radius: 10px;
      padding: 10px;
    }
  </style>
</head>
<body>
  <div class="nav">
    <div class="left">
      <h2>Pmax</h2>
    </div>

    <div class="right">
      <h2>Signup</h2>
      <h2>Login</h2>
    </div>
  </div>

  <div class="hero-section">
    <h1>🍿 Welcome to Pmax 🍿</h1>
    <h2>Browse Latest Movies 🎥 </h2>
    <button>Browse</button>
  </div>
</body>
</html>
